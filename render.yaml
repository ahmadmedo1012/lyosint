services:
  - type: pserv
    name: lyosint-api
    runtime: node
    plan: starter
    region: oregon
    branch: main
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile=false && pnpm --filter @workspace/db run push && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_USERNAME
        value: admin
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        sync: false
    disk:
      name: lyosint-data
      mountPath: /var/data
      sizeGB: 1

staticSites:
  - type: web
    name: lyosint-web
    runtime: static
    plan: free
    branch: main
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile=false && pnpm --filter @workspace/lyosint run build
    staticPublishPath: artifacts/lyosint/dist/public
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        sync: false
