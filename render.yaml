services:
  - type: pserv
    name: lyosint
    runtime: node
    plan: starter
    region: oregon
    branch: main
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile=false && pnpm --filter @workspace/db run push && pnpm run build
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_USERNAME
        value: admin
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: VITE_TELEGRAM_BOT_USERNAME
        value: lyosintbot
        sync: false
      - key: VITE_API_URL
        value: ""
        sync: false
