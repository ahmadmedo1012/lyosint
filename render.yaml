services:
  - type: web
    name: lyosint
    runtime: docker
    plan: starter
    region: oregon
    branch: main
    rootDir: .
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: VITE_TELEGRAM_BOT_USERNAME
        value: lyosintbot
      - key: PUBLIC_URL
        sync: false
      - key: VITE_API_URL
        value: https://lyosint.onrender.com
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: RATE_LIMIT_MAX
        sync: false
      - key: RATE_LIMIT_WINDOW_MS
        sync: false
      - key: CACHE_TTL_SECONDS
        sync: false
      - key: CACHE_MAX_ENTRIES
        sync: false
      - key: INTELX_API_KEY
        sync: false
      - key: SHODAN_API_KEY
        sync: false
      - key: HIBP_API_KEY
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
