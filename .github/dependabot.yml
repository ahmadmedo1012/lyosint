version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: UTC
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - dependencies
    assignees:
      - anomalyco
    reviewers:
      - anomalyco
    groups:
      production-deps:
        dependency-type: production
        update-types:
          - patch
          - minor
      dev-deps:
        dependency-type: development
        update-types:
          - patch
          - minor

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
    assignees:
      - anomalyco
