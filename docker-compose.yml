services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lyosint-postgres
    restart: unless-stopped
    shm_size: 256mb
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lyosint}
      POSTGRES_USER: ${POSTGRES_USER:-lyosint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lyosint_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER:-lyosint} -d ${POSTGRES_DB:-lyosint}
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lyosint

  redis:
    image: redis:7-alpine
    container_name: lyosint-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - 6379:6379
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - lyosint

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lyosint-api
    restart: unless-stopped
    ports:
      - 3000:3000
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-lyosint}:${POSTGRES_PASSWORD:-lyosint_dev}@postgres:5432/${POSTGRES_DB:-lyosint}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      VITE_TELEGRAM_BOT_USERNAME: ${VITE_TELEGRAM_BOT_USERNAME:-lyosintbot}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3000}
    volumes:
      - ./artifacts/api-server/src:/app/artifacts/api-server/src
      - ./lib:/app/lib
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lyosint

volumes:
  postgres_data:
  redis_data:

networks:
  lyosint:
    driver: bridge
